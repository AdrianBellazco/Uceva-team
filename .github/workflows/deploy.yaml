name: Deploy to Siteground - HallOfDoom

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Clonar el repositorio en la máquina del runner
      - name: Checkout code
        uses: actions/checkout@v4

      # Configurar Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Verificar archivos del repositorio
      - name: Verificar estructura del proyecto
        run: |
          pwd
          ls -la

      # Instalar dependencias del proyecto
      - name: Install Dependencies
        run: npm install

      # Build del proyecto Angular
      - name: Build Angular Project
        run: npm run build

      # Verificar carpeta dist
      - name: Verificar build generado
        run: |
          ls -la
          ls -la dist