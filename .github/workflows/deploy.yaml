name: Deploy to Siteground - HallOfDoom

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Clonar el repositorio en la máquina del runner
      - name: Checkout code
        uses: actions/checkout@v4

      # Configurar Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # Verificar estructura del repositorio
      - name: Pruebas consola
        run: |
          pwd
          ls -la
          find . -maxdepth 2 -type f